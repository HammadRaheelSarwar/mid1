<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Agent UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="shell">
    <section class="hero">
      <p class="label">PYTHON AGENT CONTROL PANEL</p>
      <h1>My Agent Chat UI</h1>
      <p class="subtitle">Custom HTML/CSS/JS frontend connected to your Python ADK backend.</p>
      <div class="meta" id="sessionMeta">Connecting...</div>
    </section>

    <section class="chat-panel">
      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="chatForm" class="chat-form">
        <input id="promptInput" type="text" placeholder="Ask: What is the time in Karachi?" autocomplete="off" required />
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <template id="messageTemplate">
    <article class="msg">
      <div class="who"></div>
      <div class="bubble"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
